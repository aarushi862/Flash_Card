<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Card App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 3em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .form-section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 40px;
      display: none;
    }

    .form-section.show {
      display: block;
    }

    .form-section h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.8em;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 2px solid #ecf0f1;
      border-radius: 5px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group input[type="file"] {
      padding: 8px;
    }

    .submit-btn {
      background: #27ae60;
      color: white;
      padding: 14px 30px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.3s;
      width: 100%;
    }

    .submit-btn:hover {
      background: #229954;
    }

    .message {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .cards-section {
      margin-top: 40px;
    }

    .cards-section h2 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2em;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    .card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card-content {
      padding: 20px;
    }

    .card-content h3 {
      color: #333;
      margin-bottom: 10px;
      font-size: 1.3em;
    }

    .card-info {
      color: #666;
      margin: 8px 0;
      font-size: 14px;
    }

    .card-info strong {
      color: #333;
    }

    .card-actions {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .delete-btn {
      background: #e74c3c;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      flex: 1;
      transition: background 0.3s;
      font-weight: 600;
    }

    .delete-btn:hover {
      background: #c0392b;
    }

    .no-cards {
      text-align: center;
      color: white;
      font-size: 18px;
      padding: 40px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2em;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }

      .form-section {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 Flash Card App</h1>
      <p>Create and manage your flash cards with images</p>
    </header>

    <!-- Add Flashcard Section -->
    <div id="formSection" class="form-section show">
      <h2>Add New Flashcard</h2>
      <div id="message" class="message"></div>
      <form id="addStudentForm">
        <div class="form-group">
          <label for="name">Flashcard Title *</label>
          <input type="text" id="name" placeholder="e.g., Biology Basics" required>
        </div>

        <div class="form-group">
          <label for="course">Subject/Course *</label>
          <input type="text" id="course" placeholder="e.g., Biology, History, etc." required>
        </div>

        <div class="form-group">
          <label for="city">Category/Location *</label>
          <input type="text" id="city" placeholder="e.g., 10th Grade, Medical School, etc." required>
        </div>

        <div class="form-group">
          <label for="image">Upload Image *</label>
          <input type="file" id="image" accept="image/*" required>
        </div>

        <button type="submit" class="submit-btn">Add Flashcard</button>
      </form>
    </div>

    <!-- Flashcards Display Section -->
    <div class="cards-section">
      <h2>Your Flashcards</h2>
      <div id="cardsContainer" class="cards-grid"></div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';
    let token = null;

    // Auto-login on page load
    async function autoLogin() {
      try {
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await response.json();
        token = data.token;
        localStorage.setItem('token', token);
        loadFlashcards();
      } catch (error) {
        console.error('Auto-login failed:', error);
      }
    }

    // Add Flashcard
    document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData();
      formData.append('name', document.getElementById('name').value);
      formData.append('course', document.getElementById('course').value);
      formData.append('city', document.getElementById('city').value);
      formData.append('image', document.getElementById('image').files[0]);

      try {
        const response = await fetch(`${API_URL}/add-student`, {
          method: 'POST',
          headers: { 'Authorization': token },
          body: formData
        });

        if (response.ok) {
          showMessage('Flashcard added successfully!', 'success');
          document.getElementById('addStudentForm').reset();
          loadFlashcards();
        } else {
          showMessage('Error adding flashcard', 'error');
        }
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    });

    // Load Flashcards
    async function loadFlashcards() {
      try {
        const response = await fetch(`${API_URL}/students`);
        const flashcards = await response.json();

        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';

        if (flashcards.length === 0) {
          container.innerHTML = '<div class="no-cards">No flashcards yet. Create one to get started!</div>';
          return;
        }

        flashcards.forEach(card => {
          const cardElement = document.createElement('div');
          cardElement.className = 'card';
          cardElement.innerHTML = `
            <img src="${API_URL}/${card.image}" alt="${card.name}" class="card-image">
            <div class="card-content">
              <h3>${card.name}</h3>
              <div class="card-info"><strong>Subject:</strong> ${card.course}</div>
              <div class="card-info"><strong>Category:</strong> ${card.city}</div>
              <div class="card-actions">
                <button class="delete-btn" onclick="deleteFlashcard(${card.id})">Delete</button>
              </div>
            </div>
          `;
          container.appendChild(cardElement);
        });
      } catch (error) {
        console.error('Error loading flashcards:', error);
      }
    }

    // Delete Flashcard
    async function deleteFlashcard(id) {
      if (!confirm('Are you sure you want to delete this flashcard?')) return;

      try {
        const response = await fetch(`${API_URL}/delete/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': token }
        });

        if (response.ok) {
          showMessage('Flashcard deleted!', 'success');
          loadFlashcards();
        } else {
          showMessage('Error deleting flashcard', 'error');
        }
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    }

    // Show Message
    function showMessage(text, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = text;
      msgDiv.className = `message show ${type}`;
      setTimeout(() => msgDiv.classList.remove('show'), 3000);
    }

    // Initialize - Auto-login on page load
    autoLogin();
  </script>
</body>
</html>
